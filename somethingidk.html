<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hi</title>

    <style>
      * * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background: #000;
        overflow: hidden;
        color: white;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          #111 0px,
          #111 6px,
          #000 6px,
          #000 12px
        );
        animation: scrollBg 8s linear infinite;
        z-index: -2;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          #242323 0px,
          #242323 6px,
          #000 6px,
          #000 12px
        );
        animation: scrollBg 8s linear infinite;
        z-index: -2;
      }

      @keyframes scrollBg {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 0 -300px;
        }
      }
      /* subtle dark vignette */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(
          circle at center,
          transparent 40%,
          rgba(0, 0, 0, 0.7)
        );
        z-index: -2;
      }

      /* ==== WRAPPER ==== */
      .wrapper {
        width: 900px;
        position: relative;
      }

      /* ==== HEADER ==== */
      .header {
        background: linear-gradient(to bottom, #ffffff, #e5e5e5);
        padding: 20px 30px;
        font-size: 26px;
        font-weight: bold;
        color: #333;
        border-radius: px 12px 0 0;
        border: 3px solid #bdbdbd;
        box-shadow:
          inset 0 3px 0 #fff,
          0 8px 25px rgba(0, 0, 0, 0.6);
      }

      /* ==== MENU ==== */
      .menu-container {
        padding: 35px 0;
        position: relative;
      }
      /* ==== MENU ITEM ==== */
      .menu-item {
        margin: 18px 0;
        position: relative;
      }

      .menu-item-bar {
        height: 90px;
        border-radius: 14px;
        background: linear-gradient(145deg, #1e1e1e, #101010);
        border: 3px solid #2c2c2c;
        display: flex;
        align-items: center;
        padding-left: 40px;
        font-size: 30px;
        font-weight: bold;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow:
          inset 0 4px 8px rgba(255, 255, 255, 0.05),
          inset 0 -6px 12px rgba(0, 0, 0, 0.8),
          0 15px 30px rgba(0, 0, 0, 0.6);
      }

      /* glossy highlight */
      .menu-item-bar::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent 0%,
          rgba(255, 255, 255, 0.15) 50%,
          transparent 100%
        );
        transition: all 0.5s ease;
      }

      .menu-item:hover .menu-item-bar::before {
        left: 130%;
      }

      /* TEXT */
      .menu-item-text {
        position: relative;
        z-index: 2;
        text-shadow: 3px 3px 0 black;
      }

      /* IMAGE SLIDE IN */
      .menu-item-bar img {
        position: absolute;
        right: -120%;
        top: 0;
        height: 100%;
        transition: all 0.35s ease;
        opacity: 0.85;
      }

      .menu-item:hover img {
        right: 0;
      }

      /* HOVER STATE (Mario yellow border style) */
      .menu-item:hover .menu-item-bar {
        transform: scale(1.06) translateX(10px);
        border: 4px solid #ffd900;
        box-shadow:
          0 0 20px rgba(255, 217, 0, 0.7),
          0 20px 40px rgba(0, 0, 0, 0.8);
      }

      /* ==== FOOTER ==== */
      .footer {
        background: linear-gradient(to bottom, #ffffff, #e9e9e9);
        padding: 15px 15px;
        border: 10px solid #bdbdbd;
        border-radius: 0 0 12px 12px;
        display: flex;
        justify-content: space-between;
        color: #333;
        font-weight: bold;
        box-shadow:
          inset 0 3px 0 #fff,
          0 10px 20px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body></body>
  <div class="wrapper">
    <div class="header">Opleiding wijzigen of stoppen</div>

    <div class="menu-container">
      <div class="menu-item" data-footer-text="money">
        <div class="menu-item-bar">
          <div class="menu-item-text">Hulp nodig bij nieuwe opleiding?</div>
          <img src="https://picsum.photos/500/200?random=1" />
        </div>
      </div>

      <div class="menu-item" data-footer-text="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA">
        <div class="menu-item-bar">
          <div class="menu-item-text">AAAAAAAAAAAAAA</div>
          <img src="https://picsum.photos/500/200?random=2" />
        </div>
      </div>

      <div class="menu-item" data-footer-text="BIG E">
        <div class="menu-item-bar">
          <div class="menu-item-text">e</div>
          <img src="https://picsum.photos/500/200?random=3" />
        </div>
      </div>

      <div class="menu-item" data-footer-text="hi there.">
        <div class="menu-item-bar">
          <div class="menu-item-text">hi</div>
          <img src="https://picsum.photos/500/200?random=4" />
        </div>
      </div>

    <div class="footer">
      <div>← Back</div>
      <div id="footer-text">footer text</div>
    </div>
  </div>

  <script>
    const footerText = document.getElementById('footer-text');
    const menuItems = document.querySelectorAll('.menu-item');
    const originalText = 'footer text';

    menuItems.forEach(item => {
      item.addEventListener('mouseover', function() {
        footerText.textContent = this.dataset.footerText;
      });
      item.addEventListener('mouseout', function() {
        footerText.textContent = originalText;
      });
    });
  </script>
  </body>
</html>
